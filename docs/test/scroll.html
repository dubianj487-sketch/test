<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scroll Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#111;height:100%}
body{font-family:-apple-system,sans-serif;min-height:200vh;background:#111;color:#eee;padding-top:env(safe-area-inset-top)}

/* セーフエリア境界の赤ライン */
.safe-line{position:fixed;top:env(safe-area-inset-top);left:0;right:0;height:2px;background:rgba(255,60,60,.9);z-index:900;pointer-events:none}
.safe-line::after{content:'↑ safe-area-inset-top';position:absolute;right:10px;top:4px;font-size:10px;color:rgba(255,100,100,.9)}

/* HUD */
.hud{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 16px);left:12px;right:12px;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;padding:12px 14px;z-index:1000;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hud-col{display:flex;flex-direction:column;gap:2px}
.hl{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.5px}
.hv{font-size:16px;font-weight:700;color:#7df}

/* モード切り替えボタン */
.mode-bar{position:fixed;top:calc(env(safe-area-inset-top) + 8px);left:12px;right:12px;display:flex;gap:8px;z-index:1000}
.mbtn{flex:1;padding:8px 6px;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;line-height:1.4}
.mbtn.on{background:rgba(80,200,255,.4)}

/* コンテンツブロック */
.block{height:90px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
</style>
</head>
<body>
<div class="safe-line"></div>

<div class="mode-bar">
  <button class="mbtn on" id="btnA" onclick="setMode('A')">Mode A<br><small style="font-weight:400">通常 padding-top</small></button>
  <button class="mbtn" id="btnB" onclick="setMode('B')">Mode B<br><small style="font-weight:400">margin-top マイナス</small></button>
</div>

<div id="content"></div>

<div class="hud">
  <div class="hud-col"><span class="hl">scrollY</span><span class="hv" id="hv-scroll">0px</span></div>
  <div class="hud-col"><span class="hl">safe-area-top</span><span class="hv" id="hv-safe">?</span></div>
  <div class="hud-col"><span class="hl">content.top</span><span class="hv" id="hv-ctop">?</span></div>
</div>

<script>
var colors=['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c'];
var content=document.getElementById('content');
for(var i=0;i<24;i++){
  var d=document.createElement('div');
  d.className='block';
  d.style.background=colors[i%colors.length];
  d.textContent='Block '+(i+1)+(i===0?' ← この色がセーフ裏に見えるか？':'');
  content.appendChild(d);
}

// safe-area-inset-top 実測
function getSafeTop(){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;visibility:hidden;padding-top:env(safe-area-inset-top)';
  document.body.appendChild(d);
  var v=parseInt(getComputedStyle(d).paddingTop)||0;
  document.body.removeChild(d);
  return v;
}
var safeTop=getSafeTop();
document.getElementById('hv-safe').textContent=safeTop+'px';

function updateHUD(){
  document.getElementById('hv-scroll').textContent=Math.round(window.scrollY)+'px';
  document.getElementById('hv-ctop').textContent=Math.round(content.getBoundingClientRect().top)+'px';
}
window.addEventListener('scroll',updateHUD,{passive:true});
updateHUD();

function setMode(m){
  document.getElementById('btnA').classList.toggle('on',m==='A');
  document.getElementById('btnB').classList.toggle('on',m==='B');
  if(m==='A'){
    document.body.style.marginTop='0';
    document.body.style.paddingTop='env(safe-area-inset-top)';
  } else {
    // コンテンツを物理的にセーフエリア裏まで押し上げる
    document.body.style.paddingTop='0';
    document.body.style.marginTop='calc(-1 * env(safe-area-inset-top))';
  }
  window.scrollTo(0,0);
  setTimeout(updateHUD,50);
}
</script>
</body>
</html>
