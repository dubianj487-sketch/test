<!DOCTYPE html>
<!-- deploy trigger -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Map Drag Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}

#map-a{position:fixed;top:0;left:0;right:0;bottom:0;display:none}

#wrap-b{margin-top:calc(-1 * env(safe-area-inset-top));height:calc(100dvh + env(safe-area-inset-top));display:none}
#map-b{width:100%;height:100%}

#wrap-c{margin-top:calc(-1 * env(safe-area-inset-top));height:calc(100dvh + env(safe-area-inset-top));display:none;flex-direction:column}
#strip-c{height:env(safe-area-inset-top);flex-shrink:0;background-image:url('https://a.basemaps.cartocdn.com/rastertiles/voyager/13/7176/3253.png');background-size:256px 256px;background-repeat:repeat-x;background-position:0 0}
#map-c{flex:1;min-height:0;width:100%}

/* Mode D */
body.mode-d{overflow-y:auto!important}
html.mode-d{overflow:auto!important;height:auto!important}
#wrap-d{display:none;margin-top:calc(-1 * env(safe-area-inset-top))}

.d-section{position:relative;height:60vh}
.d-map{width:100%;height:100%}
.d-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  z-index:500;
  touch-action:pan-y;
}
.d-white{height:30vh;background:#fff;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:12px;color:#aaa}

/* バーチャルスティック */
.d-stick-wrap{
  position:absolute;bottom:14px;right:14px;
  z-index:600;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
}
.d-stick-base{
  width:72px;height:72px;border-radius:50%;
  background:rgba(0,0,0,.25);
  border:2px solid rgba(255,255,255,.5);
  position:relative;
}
.d-stick-knob{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.85);
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

.safe-line{position:fixed;top:env(safe-area-inset-top);left:0;right:0;height:2px;background:rgba(255,60,60,.8);z-index:9000;pointer-events:none}
.safe-line::after{content:'safe-area-inset-top';position:absolute;right:8px;top:3px;font-size:10px;color:rgba(255,100,100,.9)}

.hud{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 16px);left:12px;right:12px;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;padding:12px 14px;z-index:9000;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-family:-apple-system,sans-serif}
.hud-col{display:flex;flex-direction:column;gap:2px}
.hl{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.5px;color:#fff}
.hv{font-size:13px;font-weight:700;color:#7df}

.mode-bar{position:fixed;top:calc(env(safe-area-inset-top) + 8px);left:12px;right:12px;display:flex;gap:8px;z-index:9000}
.mbtn{flex:1;padding:8px 6px;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(0,0,0,.55);color:#fff;line-height:1.4;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mbtn.on{background:rgba(80,200,255,.5)}
</style>
</head>
<body>
<div class="safe-line"></div>

<div class="mode-bar">
  <button class="mbtn on" id="btnA" onclick="setMode('A')">Mode A<br><small style="font-weight:400">fixed</small></button>
  <button class="mbtn" id="btnB" onclick="setMode('B')">Mode B<br><small style="font-weight:400">通常フロー</small></button>
  <button class="mbtn" id="btnC" onclick="setMode('C')">Mode C<br><small style="font-weight:400">bg-image</small></button>
  <button class="mbtn" id="btnD" onclick="setMode('D')">Mode D<br><small style="font-weight:400">scroll+stick</small></button>
</div>

<div id="map-a"></div>
<div id="wrap-b"><div id="map-b"></div></div>
<div id="wrap-c"><div id="strip-c"></div><div id="map-c"></div></div>
<div id="wrap-d">
  <div class="d-section">
    <div class="d-map" id="map-d1"></div>
    <div class="d-overlay"></div>
    <div class="d-stick-wrap" id="stick-d1"><div class="d-stick-base"><div class="d-stick-knob"></div></div></div>
  </div>
  <div class="d-white">— 白 —</div>
  <div class="d-section">
    <div class="d-map" id="map-d2"></div>
    <div class="d-overlay"></div>
    <div class="d-stick-wrap" id="stick-d2"><div class="d-stick-base"><div class="d-stick-knob"></div></div></div>
  </div>
  <div class="d-white">— 白 —</div>
  <div class="d-section">
    <div class="d-map" id="map-d3"></div>
    <div class="d-overlay"></div>
    <div class="d-stick-wrap" id="stick-d3"><div class="d-stick-base"><div class="d-stick-knob"></div></div></div>
  </div>
</div>

<div class="hud">
  <div class="hud-col"><span class="hl">mode</span><span class="hv" id="hv-mode">A / position:fixed</span></div>
  <div class="hud-col"><span class="hl">safe-area-top</span><span class="hv" id="hv-safe">?</span></div>
  <div class="hud-col"><span class="hl" id="hl-lat">map center lat</span><span class="hv" id="hv-lat">-</span></div>
  <div class="hud-col"><span class="hl" id="hl-lng">map center lng</span><span class="hv" id="hv-lng">-</span></div>
</div>

<script>
var tileUrl='https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
var tileOpt={attribution:'&copy; OSM contributors &copy; CARTO',subdomains:'abcd',maxZoom:19};
var center=[34.6937,135.5023],zoom=13;
var mapA=null,mapB=null,mapC=null;

function getSafeTop(){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;visibility:hidden;padding-top:env(safe-area-inset-top)';
  document.body.appendChild(d);
  var v=parseInt(getComputedStyle(d).paddingTop)||0;
  document.body.removeChild(d);
  return v;
}
document.getElementById('hv-safe').textContent=getSafeTop()+'px';

function updateCenter(m){
  if(!m) return;
  var c=m.getCenter();
  document.getElementById('hv-lat').textContent=c.lat.toFixed(5);
  document.getElementById('hv-lng').textContent=c.lng.toFixed(5);
}
function updateScrollY(){
  document.getElementById('hv-lat').textContent=Math.round(window.scrollY)+'px';
  document.getElementById('hv-lng').textContent=Math.round(document.getElementById('wrap-d').getBoundingClientRect().top)+'px';
}

function initA(){
  if(mapA) return;
  document.getElementById('map-a').style.display='block';
  mapA=L.map('map-a',{center:center,zoom:zoom,zoomControl:true});
  L.tileLayer(tileUrl,tileOpt).addTo(mapA);
  mapA.on('move',function(){updateCenter(mapA)});
  setTimeout(function(){mapA.invalidateSize({animate:false})},100);
  setTimeout(function(){mapA.invalidateSize({animate:false})},300);
  updateCenter(mapA);
}
function initB(){
  if(mapB) return;
  mapB=L.map('map-b',{center:center,zoom:zoom,zoomControl:true});
  L.tileLayer(tileUrl,tileOpt).addTo(mapB);
  mapB.on('move',function(){updateCenter(mapB)});
  setTimeout(function(){mapB.invalidateSize({animate:false})},100);
  setTimeout(function(){mapB.invalidateSize({animate:false})},300);
  updateCenter(mapB);
}
function initC(){
  if(mapC) return;
  mapC=L.map('map-c',{center:center,zoom:zoom,zoomControl:true});
  L.tileLayer(tileUrl,tileOpt).addTo(mapC);
  mapC.on('move',function(){updateCenter(mapC)});
  setTimeout(function(){mapC.invalidateSize({animate:false})},100);
  setTimeout(function(){mapC.invalidateSize({animate:false})},300);
  updateCenter(mapC);
}

function makeStick(stickWrapId,map){
  var wrap=document.getElementById(stickWrapId);
  var base=wrap.querySelector('.d-stick-base');
  var knob=wrap.querySelector('.d-stick-knob');
  var MAX=20;
  var PAN_SPEED=1.2;
  var dx=0,dy=0,raf=null;

  function loop(){
    if(dx!==0||dy!==0) map.panBy([dx*PAN_SPEED,dy*PAN_SPEED],{animate:false,noMoveStart:true});
    raf=requestAnimationFrame(loop);
  }
  function reset(){
    dx=0;dy=0;
    knob.style.transform='translate(-50%,-50%)';
    if(raf){cancelAnimationFrame(raf);raf=null;}
  }

  base.addEventListener('touchstart',function(e){
    e.stopPropagation();
    if(!raf) raf=requestAnimationFrame(loop);
  },{passive:false});

  base.addEventListener('touchmove',function(e){
    e.stopPropagation();
    e.preventDefault();
    var t=e.touches[0];
    var r=base.getBoundingClientRect();
    var ox=t.clientX-(r.left+r.width/2);
    var oy=t.clientY-(r.top+r.height/2);
    var dist=Math.sqrt(ox*ox+oy*oy);
    if(dist>MAX){ox=ox/dist*MAX;oy=oy/dist*MAX;}
    dx=ox;dy=oy;
    knob.style.transform='translate(calc(-50% + '+ox+'px),calc(-50% + '+oy+'px))';
  },{passive:false});

  base.addEventListener('touchend',function(e){e.stopPropagation();reset();},{passive:false});
  base.addEventListener('touchcancel',function(e){e.stopPropagation();reset();},{passive:false});
}

var mapD=[];
function initD(){
  if(mapD.length) return;
  ['map-d1','map-d2','map-d3'].forEach(function(id,i){
    var m=L.map(id,{center:center,zoom:zoom,zoomControl:false,attributionControl:false});
    L.tileLayer(tileUrl,tileOpt).addTo(m);
    mapD.push(m);
    makeStick('stick-d'+(i+1),m);
  });
  setTimeout(function(){mapD.forEach(function(m){m.invalidateSize({animate:false})})},100);
  setTimeout(function(){mapD.forEach(function(m){m.invalidateSize({animate:false})})},300);
}

window.addEventListener('scroll',function(){
  if(currentMode==='D') updateScrollY();
},{passive:true});

var currentMode='A';
function setMode(m){
  currentMode=m;
  ['A','B','C','D'].forEach(function(x){
    document.getElementById('btn'+x).classList.toggle('on',m===x);
  });
  document.body.classList.remove('mode-d');
  document.documentElement.classList.remove('mode-d');
  window.scrollTo(0,0);
  document.getElementById('map-a').style.display='none';
  document.getElementById('wrap-b').style.display='none';
  document.getElementById('wrap-c').style.display='none';
  document.getElementById('wrap-d').style.display='none';
  document.getElementById('hl-lat').textContent='map center lat';
  document.getElementById('hl-lng').textContent='map center lng';

  if(m==='A'){
    document.getElementById('map-a').style.display='block';
    document.getElementById('hv-mode').textContent='A / fixed';
    initA();
  } else if(m==='B'){
    document.getElementById('wrap-b').style.display='flex';
    document.getElementById('hv-mode').textContent='B / 通常フロー';
    initB();
    setTimeout(function(){mapB&&mapB.invalidateSize({animate:false})},100);
  } else if(m==='C'){
    document.getElementById('wrap-c').style.display='flex';
    document.getElementById('hv-mode').textContent='C / bg-image strip';
    initC();
    setTimeout(function(){mapC&&mapC.invalidateSize({animate:false})},100);
  } else {
    document.body.classList.add('mode-d');
    document.documentElement.classList.add('mode-d');
    document.getElementById('wrap-d').style.display='block';
    document.getElementById('hv-mode').textContent='D / scroll+stick';
    document.getElementById('hl-lat').textContent='scrollY';
    document.getElementById('hl-lng').textContent='wrap.top';
    initD();
    setTimeout(function(){mapD.forEach(function(m){m.invalidateSize({animate:false})})},100);
    updateScrollY();
  }
}

initA();
</script>
</body>
</html>
