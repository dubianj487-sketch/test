<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8e4e0">
<title>Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* htmlとbodyを完全に画面いっぱいに広げる（100vhと、iOS対策のsvh/dvhなどを意識） */
html,body{
  width:100%;
  height: 100vh;
  height: 100dvh; /* 動的ビューポート対応 */
  overflow:hidden;
  background:#e8e4e0;
}

/* マップを画面の隅々（セーフエリアの裏）まで強制展開 */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.leaflet-container{background:#e8e4e0}

/* 【重要】ズームボタンなどのUIがノッチやホームインジケーターに被るのを防ぐ */
.leaflet-top {
  top: env(safe-area-inset-top, 0px);
}
.leaflet-bottom {
  bottom: env(safe-area-inset-bottom, 0px);
}
.leaflet-left {
  left: env(safe-area-inset-left, 0px);
}
.leaflet-right {
  right: env(safe-area-inset-right, 0px);
}
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map', {
  center: [34.6937, 135.5023],
  zoom: 13,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

/* PWAやiOS Safariでは、ロード直後に画面サイズ（セーフエリア含む）が
  確定するまで僅かにラグがあるため、数回に分けてinvalidateSizeを呼ぶとより安全です。
*/
setTimeout(function(){ map.invalidateSize({animate:false}); }, 100);
setTimeout(function(){ map.invalidateSize({animate:false}); }, 300);
</script>
</body>
</html>
