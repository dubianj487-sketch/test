<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="build-hash" content="DEPLOY_HASH_PLACEHOLDER">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#CE95B0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>🌙 SILDE</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Opti:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{color-scheme:light only}
html{-webkit-color-scheme:light;color-scheme:light}
:root{
  --pk:#e88fac;--pkl:#fde8ef;--pkp:#fef3f7;
  --pu:#c478a8;--pul:#f7e4f2;--lav:#f0cfe0;
  --gr:#6a9e8a;--tx:#2a1218;--txs:#7a4a68;
  --night:#9b3a6a;--card:rgba(255,255,255,.97);
  --sh:0 4px 20px rgba(200,100,140,.12);
  --gold:#e88fac;--teal:#c4608a;
}
body{font-family:var(--app-font,'Zen Maru Gothic'),sans-serif;background:#CE95B0 !important;background-color:#CE95B0 !important;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:var(--tx) !important;overscroll-behavior:none;touch-action:manipulation;padding-top:env(safe-area-inset-top)}
html{background:#CE95B0 !important;background-color:#CE95B0 !important;overscroll-behavior:none;height:100dvh}
/* ===== フォント切り替え ===== */
body.font-shun{--app-font:'Noto Sans JP'}
body.font-shun .auto-dep-time,body.font-shun .shift-stepper-time,
body.font-shun .tl-time,body.font-shun .today-banner-date,
body.font-shun .today-banner::before,body.font-shun .hist-item-date,
body.font-shun .hist-detail-date{font-family:'Noto Sans JP',sans-serif!important}
body.font-shun .nb,body.font-shun input,body.font-shun select,
body.font-shun .btn,body.font-shun .bmap,body.font-shun .dep-tab,
body.font-shun .otab,body.font-shun .obox.boy{font-family:'Noto Sans JP',sans-serif!important}
/* ===== しゅんくんテーマ カラー ===== */
body.font-shun{
  --pk:#5a8ab5;--pkl:#dce8f5;--pkp:#eef4fa;
  --pu:#3a6090;--pul:#ccdcee;--lav:#b0c8e0;
  --gr:#4a7a9a;--tx:#1a2540;--txs:#4a5a7a;
  --night:#1e3050;--card:rgba(255,255,255,.97);
  --sh:0 4px 20px rgba(30,60,120,.12);
  --gold:#5a8ab5;--teal:#2a5a8a;
  background:#111111 !important;background-color:#111111 !important
}
html:has(body.font-shun){background:#111111 !important}
body.font-shun .pg{background:#c8c8c8}
body.font-shun .loading-overlay{background:rgba(30,48,80,.92)}
body.font-shun .hdr{background:#111111;box-shadow:0 2px 18px rgba(10,20,50,.3)}
body.font-shun .hdr-t{color:#e8f0f8}
body.font-shun .hdr-s{color:rgba(180,210,240,.7)}
body.font-shun .bp{background:#2a5a8a;box-shadow:0 4px 14px rgba(30,60,120,.3)}
body.font-shun .bgr{background:linear-gradient(135deg,#3a7aaa,#2a5a8a)}
body.font-shun .bmap{background:linear-gradient(135deg,#3a7aaa,#2a5a8a)}
body.font-shun .bdk{background:#1e3050}
body.font-shun .bsave{background:linear-gradient(135deg,#5a8ab5,#2a5a8a);box-shadow:0 4px 14px rgba(30,60,120,.3)}
body.font-shun .today-banner{background:linear-gradient(135deg,#2a5a8a,#5a8ab5)}
body.font-shun .obox.shun{background:linear-gradient(135deg,#1e3050,#2a5a8a)}
body.font-shun .nb.active{color:#2a5a8a;border-top-color:#2a5a8a}
body.font-shun .dep-tab.sel{border-color:#5a8ab5;background:#dce8f5;color:#1e3050}
body.font-shun .otab.active{background:#1e3050;border-color:#1e3050}
body.font-shun .hist-dot.active{background:#2a5a8a}
.font-toggle{margin-left:auto;align-self:center;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 11px;cursor:pointer;font-size:12px;color:#fde8e8;font-weight:700;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap}
.font-toggle:active{transform:scale(.96)}
.font-toggle .ft-icon{font-size:14px}

.hdr{background:#CE95B0;padding:0 14px 7px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 2px 18px rgba(180,100,140,.3);position:sticky;top:0;z-index:200}
.hdr-moon{font-size:24px;line-height:1;animation:mf 4s ease-in-out infinite}
@keyframes mf{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
.hdr-t{font-size:20px;color:#fde8e8;font-weight:700;line-height:1}
.hdr-s{font-size:12px;color:rgba(253,220,220,.7);margin-top:2px}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;display:flex;box-shadow:0 -4px 20px rgba(80,60,140,.15)}
.nb{flex:1;padding:6px 4px 4px;border:none;background:none;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;color:#aaa8c0;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:3px solid transparent;transition:all .2s}
.nb .ni{font-size:20px}
.nb.active{color:var(--teal);border-top-color:var(--teal);font-weight:700}

.pg{display:none;padding:14px 14px 56px;animation:fi .25s ease;overflow-y:scroll;overscroll-behavior:contain;flex:1;min-height:0;-webkit-overflow-scrolling:touch;background:#E5C1D4}
.pg.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.ctitle{font-size:16px;font-weight:700;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:6px}

label{display:block;font-size:14px;color:var(--txs);margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:10px 14px;border:2px solid var(--lav);border-radius:11px;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:var(--tx);background:#fff;outline:none;margin-bottom:12px;-webkit-appearance:none;transition:border .2s}
input:focus,select:focus{border-color:var(--pk)}
input:disabled{background:#f8f8f8;color:#9ca3af;border-color:#e5e7eb}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border:none;border-radius:13px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;transition:all .18s;margin-bottom:8px}
.btn:active{transform:scale(.97)}
.bp{background:#CE95B0;color:#fff;box-shadow:0 4px 14px rgba(180,100,140,.3)}
.bg{background:var(--pul);color:var(--teal);border:2px solid var(--lav)}
.bo{background:#fff;color:var(--pk);border:2px dashed var(--pk)}
.bd{background:#fee2e2;color:#ef4444;border:2px solid #fca5a5}
.bgr{background:linear-gradient(135deg,#6a9e8a,#4a8070);color:#fff}
.bdk{background:var(--night);color:#fde8e8}
.bsave{background:linear-gradient(135deg,#e88fac,#c4608a);color:#fff;box-shadow:0 4px 14px rgba(200,100,140,.3)}
.sm{padding:7px 14px;font-size:12px;border-radius:9px;width:auto;margin-bottom:0}
.bmap{background:linear-gradient(135deg,#d4709a,#c4608a);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.bmap:active{transform:scale(.95)}
.bmap.calculating{background:linear-gradient(135deg,#f0a0c0,#e88fac);animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.dep-tabs{display:flex;gap:8px;margin-bottom:10px}
.dep-tab{flex:1;padding:9px 6px;border:2px solid var(--lav);border-radius:11px;background:#fff;color:#aaa8c0;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.dep-tab.sel{border-color:var(--pk);background:var(--pkl);color:#a83868}

.auto-dep-box{background:linear-gradient(135deg,#fef6f9,var(--pul));border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.auto-dep-label{font-size:13px;color:var(--txs);font-weight:600}
.auto-dep-time{font-size:28px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx)}
.auto-dep-note{font-size:12px;color:#aaa8c0;margin-top:2px}

.gi-card{background:var(--pkp);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.gi-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.gi-badge{font-size:12px;font-weight:700;color:var(--teal);background:var(--pul);padding:3px 10px;border-radius:20px}
.rm-btn{background:none;border:none;font-size:17px;color:#c0a8c8;cursor:pointer;padding:0}

.shift-stepper{display:flex;align-items:center;gap:0;margin-bottom:10px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(180,100,140,.08)}
.shift-stepper-btn{width:44px;height:44px;border:none;background:none;cursor:pointer;font-size:18px;font-weight:700;color:var(--pk);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
.shift-stepper-btn:active{background:var(--pkl)}
.shift-stepper-time{flex:1;text-align:center;font-size:20px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx);padding:0 4px;line-height:44px}
.shift-stepper-hint{font-size:10px;color:#aaa8c0;text-align:center;margin-top:-6px;margin-bottom:8px}

.min-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.min-row input{margin-bottom:0;flex:1}
.min-row span{font-size:11px;color:#aaa8c0;white-space:nowrap}

.run-block{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(180,100,140,.07)}
.run-label{font-size:11px;font-weight:700;color:var(--teal);background:var(--pul);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.tl-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--lav)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-pick{background:var(--pk)}
.dot-drop{background:#7ab8c8}
.tl-time{font-size:17px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx);min-width:48px}
.tl-name{font-size:14px;flex:1}
.tl-badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.badge-pick{background:var(--pkl);color:var(--teal)}
.badge-drop{background:#dff0f5;color:#4a8098}
.tl-min{font-size:12px;color:var(--txs);background:var(--pul);padding:2px 8px;border-radius:20px;flex-shrink:0}

.otabs{display:flex;gap:6px;margin-bottom:10px}
.otab{flex:1;padding:9px;text-align:center;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--lav);font-family:'Zen Maru Gothic',sans-serif;background:#fff;color:var(--txs);transition:all .2s}
.otab.active{background:var(--night);color:#fde8e8;border-color:var(--night)}
.obox{border-radius:13px;padding:14px;font-size:14px;line-height:2.1;white-space:pre-wrap;word-break:break-all;margin-bottom:10px;min-height:70px}
.obox.shun{background:linear-gradient(135deg,#9b3a6a,#c4608a);color:#fff;font-family:monospace}
.obox.boy{background:#fff;color:var(--tx);font-family:'Zen Maru Gothic',sans-serif}

.mcard{border-radius:13px;padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.mcard.girl{background:var(--pkp)}
.mcard.place{background:var(--pul)}
.mcard.dep{background:#f0faf6}
.mc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mc-av.g{background:linear-gradient(135deg,#e88fac,#c4608a)}
.mc-av.p{background:linear-gradient(135deg,#c4608a,#a84878);border-radius:9px}
.mc-av.d{background:linear-gradient(135deg,#6a9e8a,#4a8070);border-radius:9px}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:14px;font-weight:700;color:var(--tx)}
.mc-sub{font-size:12px;color:#8888a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.mo{display:none;position:fixed;inset:0;background:rgba(20,18,40,.55);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:#fff;border-radius:22px 22px 0 0;padding:20px 18px 34px;width:100%;max-height:88vh;overflow-y:auto;animation:su .28s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mclose{background:none;border:none;font-size:22px;color:#aaa8c0;cursor:pointer}

.today-banner{background:linear-gradient(135deg,#c4608a,#e88fac);border-radius:18px;padding:16px;margin-bottom:0;color:#fff;position:relative;overflow:hidden}
.today-banner::before{content:'TODAY';position:absolute;right:-8px;top:-8px;font-size:60px;font-weight:700;opacity:.1;font-family:'Kaisei Opti',serif;line-height:1;color:#fff}
.today-banner-label{font-size:11px;font-weight:700;opacity:.75;margin-bottom:4px}
.today-banner-date{font-size:20px;font-weight:700;font-family:'Kaisei Opti',serif;margin-bottom:10px}
.today-banner-empty{font-size:13px;opacity:.65}

.month-acc{background:var(--card);border-radius:18px;margin-bottom:10px;box-shadow:var(--sh);overflow:hidden}
.month-acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.month-acc-title{font-size:14px;font-weight:700;color:var(--tx)}
.month-acc-count{font-size:11px;font-weight:700;color:#fff;background:var(--teal);padding:2px 9px;border-radius:20px}
.month-acc-arr{font-size:14px;color:var(--txs);transition:transform .25s}
.month-acc.open .month-acc-arr{transform:rotate(180deg)}
.month-acc-body{display:none;padding:0 12px 12px}
.month-acc.open .month-acc-body{display:block}
#pg-hist{overflow:hidden !important;flex-direction:column;padding:0 0 52px}
#pg-hist.active{display:flex !important}
.hist-dots{display:flex;justify-content:center;gap:7px;padding:8px 0 4px;flex-shrink:0}
.hist-dot{width:7px;height:7px;border-radius:50%;background:rgba(180,100,140,.25);transition:background .2s;cursor:pointer}
.hist-dot.active{background:#c4608a}
#histSlider{display:flex;flex:1;min-height:0;overflow-x:scroll;scroll-snap-type:x mandatory;scrollbar-width:none}
#histSlider::-webkit-scrollbar{display:none}
#histPageToday,#histPageMonths{min-width:100%;scroll-snap-align:start;overflow-y:scroll;overscroll-behavior:contain;padding:14px 14px 160px}
.memo-box{background:var(--pkp);border-radius:14px 14px 0 0;padding:0 14px 14px;position:fixed;bottom:56px;left:0;right:0;z-index:20;transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);box-shadow:0 -4px 24px rgba(180,100,140,.13)}
.memo-handle{display:flex;justify-content:center;padding:8px 0 4px;cursor:pointer;touch-action:none}
.memo-handle-bar{width:40px;height:4px;border-radius:2px;background:rgba(180,100,140,.3)}
.memo-hdr{font-size:13px;font-weight:700;color:var(--txs);margin-bottom:8px}
.memo-inp{width:100%;min-height:90px;border:1.5px solid rgba(220,130,170,.3);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:vertical;background:#fff;color:var(--tx);outline:none}

.hist-item{background:var(--pkp);border-radius:13px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.hist-item:active{transform:scale(.98);background:var(--pkl)}
.hist-item-hdr{display:flex;align-items:center;justify-content:space-between}
.hist-item-date{font-size:15px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx)}
.hist-item-sub{font-size:12px;color:#aaa8c0;margin-top:2px}
.hist-item-badge{font-size:12px;font-weight:700;color:var(--teal);background:var(--pul);padding:2px 9px;border-radius:20px}
.hist-item-arr{font-size:14px;color:var(--txs)}

.hist-detail-date{font-size:18px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx);margin-bottom:14px}
.hist-detail-run{background:var(--pkp);border-radius:13px;padding:12px;margin-bottom:10px}
.hist-detail-run-lbl{font-size:11px;font-weight:700;color:var(--teal);background:var(--pul);padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:10px}
.edit-time-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px dashed var(--lav)}
.edit-time-row:last-child{border-bottom:none}
.edit-time-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.edit-time-inp{font-size:15px;font-weight:700;font-family:'Kaisei Opti',serif;color:var(--tx);border:none;border-bottom:2px solid var(--lav);background:transparent;outline:none;width:54px;padding:0 2px}
.edit-time-inp:focus{border-bottom-color:var(--pk)}
.edit-time-name{font-size:12px;flex:1;color:var(--tx)}
.edit-time-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;flex-shrink:0}

.empty-hist{text-align:center;padding:36px 14px;color:#aaa8c0}
.empty-hist .ei{font-size:40px;margin-bottom:8px}
.fab{position:fixed;bottom:58px;right:14px;z-index:190;width:90px;height:110px;background:none;border:none;cursor:pointer;padding:0;transition:transform .25s cubic-bezier(.34,1.56,.64,1);transform:translateY(30px)}
.fab:hover,.fab:focus{transform:translateY(10px)}
.fab:active{transform:translateY(14px) scale(.96)}
.fab img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 -4px 12px rgba(200,100,140,.35))}
@keyframes pawPeek{0%{transform:translateY(60px)}60%{transform:translateY(5px)}80%{transform:translateY(14px)}100%{transform:translateY(30px)}}
.fab.init{animation:pawPeek .8s cubic-bezier(.34,1.56,.64,1) forwards}

.empty-hist p{font-size:13px}

.save-success-bar{background:linear-gradient(135deg,#c4608a,#e88fac);border-radius:13px;padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;animation:fi .3s ease}
.save-success-bar span{font-size:13px;font-weight:700;color:#fde8e8;flex:1}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--night);color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.toast.show{opacity:1;visibility:visible}
.empty-note{font-size:12px;color:#aaa8c0;text-align:center;padding:14px}
hr.dv{border:none;border-top:2px dashed var(--lav);margin:12px 0}

/* ローディングオーバーレイ */
.loading-overlay{position:fixed;inset:0;background:rgba(206,149,176,.92);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.loading-spinner{width:48px;height:48px;border:5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif}
.loading-sub{font-size:12px;opacity:.75;margin-top:6px;font-family:'Zen Maru Gothic',sans-serif}
@media (min-width: 768px) {
  .hdr{position:relative;top:auto;padding-top:7px}
  .pg{padding-left:max(14px,calc(50% - 300px));padding-right:max(14px,calc(50% - 300px))}
  #histPageToday,#histPageMonths{padding-left:max(14px,calc(50% - 300px));padding-right:max(14px,calc(50% - 300px))}
  .bnav{padding-left:max(0px,calc(50% - 300px));padding-right:max(0px,calc(50% - 300px))}
  .memo-box{left:max(0px,calc(50% - 300px));right:max(0px,calc(50% - 300px))}
}
@media (display-mode: standalone) {
  body{padding-top:max(env(safe-area-inset-top),7px)}
  .hdr{padding-top:7px}
  .bnav{padding-bottom:env(safe-area-inset-bottom)}
  .memo-box{bottom:calc(56px + env(safe-area-inset-bottom))}
  .pg{padding-bottom:calc(56px + env(safe-area-inset-bottom))}
  #pg-hist{padding:0 0 calc(52px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">🌙 読み込み中...</div>
  <div class="loading-sub">スプレッドシートからデータを取得しています</div>
</div>

<div class="hdr">
  <div class="hdr-moon">🌙</div>
  <div>
    <div class="hdr-t">SILDE</div>
    <div class="hdr-s">出勤時間から逆算・全自動スケジュール</div>
  </div>
  <button class="font-toggle" id="fontToggleBtn" onclick="toggleFont()" title="フォント切り替え">
    <span class="ft-icon" id="ftIcon">🌸</span>
    <span id="ftLabel">ひーちゃん</span>
  </button>
</div>

<!-- SCHEDULE MODAL (bottom sheet) -->
<div class="mo" id="moSched">
  <div class="mbox" style="max-height:calc(100dvh - 80px)">
    <div class="mtitle" style="position:sticky;top:0;background:#fff;z-index:10;padding-bottom:10px;margin-bottom:4px">
      <span style="font-size:16px;font-weight:700">🚗 スケジュール作成</span>
      <button class="mclose" style="font-size:14px;color:#fff;background:var(--teal);border-radius:20px;padding:5px 14px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700" onclick="closeSchedModal()">✕ キャンセル</button>
    </div>
    <div id="schedFormContent">
    <div class="card">
      <div class="ctitle">📅 日付</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="date" id="dateInp" style="flex:1;margin-bottom:0">
        <button class="btn bg sm" onclick="setToday()">今日</button>
        <button class="btn bg sm" onclick="setTomorrow()">明日</button>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">🚩 出発地</div>
      <div class="dep-tabs">
        <button class="dep-tab sel" id="dt-saved" onclick="setDepMode('saved')">📍 登録済み</button>
        <button class="dep-tab" id="dt-manual" onclick="setDepMode('manual')">✏️ 直接入力</button>
      </div>
      <div id="dep-saved-area">
        <label>出発地を選ぶ</label>
        <select id="depLocSel" onchange="onDepChange()" style="margin-bottom:0"></select>
      </div>
      <div id="dep-manual-area" style="display:none">
        <label>出発地名</label>
        <input type="text" id="depManualName" placeholder="○○カフェ、友達の家など" oninput="onDepChange()" style="margin-bottom:10px">
        <label>出発時刻（手動）</label>
        <input type="time" id="depManualTime" value="18:30" onchange="onDepChange()" style="margin-bottom:0">
      </div>
      <div id="autoDepDisplay" style="display:none;margin-top:10px">
        <div class="auto-dep-box">
          <div>
            <div class="auto-dep-label">🔮 逆算した出発時刻</div>
            <div class="auto-dep-time" id="autoDepTime">--:--</div>
            <div class="auto-dep-note">移動時間を入力すると自動で更新されるよ</div>
          </div>
          <div style="font-size:28px">🚗</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">👩 女の子の出勤情報</div>
      <div id="girlInputs"></div>
    </div>
    <button class="btn bp" onclick="buildSchedule()">✨ スケジュール生成</button>
    <div id="resultSection" style="display:none">
      <div class="card">
        <div class="ctitle">🗓 スケジュール</div>
        <div id="resultBlocks"></div>
      </div>
      <div class="card">
        <div class="ctitle">📋 コピー用テキスト</div>
        <div class="otabs">
          <button class="otab active" id="tabS" onclick="switchOutTab('shun')">🌙 しゅんくん用</button>
          <button class="otab" id="tabB" onclick="switchOutTab('boy')">📤 ボーイさん用</button>
        </div>
        <div id="outShun" class="obox shun"></div>
        <div id="outBoy" class="obox boy" style="display:none"></div>
        <button class="btn bdk" id="cpyS" onclick="copyOut('shun')">📋 しゅんくん用をコピー</button>
        <button class="btn bgr" id="cpyB" style="display:none" onclick="copyOut('boy')">📤 ボーイさん用をコピー</button>
      </div>
      <button class="btn bsave" onclick="saveSchedule()">💾 このスケジュールを保存</button>
    </div>
    </div>
  </div>
</div>

<div class="pg active" id="pg-hist">
  <div class="hist-dots">
    <span class="hist-dot active" id="dot-today" onclick="slideTo(0)"></span>
    <span class="hist-dot" id="dot-months" onclick="slideTo(1)"></span>
  </div>
  <div id="histSlider">
    <div id="histPageToday"></div>
    <div id="histPageMonths"><div id="histContent" style="min-height:60vh"></div></div>
  </div>
  <div class="memo-box">
    <div class="memo-handle"><div class="memo-handle-bar"></div></div>
    <div class="memo-hdr">📝 共有メモ</div>
    <textarea id="memoInp" class="memo-inp" oninput="onMemoInput()" placeholder="ここに共有メモを入力..."></textarea>
  </div>
</div>

<div class="pg" id="pg-master">
  <div class="card">
    <div class="ctitle">🚩 出発地マスター</div>
    <div id="depMasterList"></div>
    <button class="btn bo" onclick="openDepMo(null)">＋ 出発地を追加</button>
  </div>
  <div class="card">
    <div class="ctitle">👩 女の子マスター</div>
    <div id="girlMasterList"></div>
    <button class="btn bo" onclick="openGirlMo(null)">＋ 女の子を追加</button>
  </div>
  <div class="card">
    <div class="ctitle">🏠 送り先マスター</div>
    <div id="placeMasterList"></div>
    <button class="btn bg" onclick="openPlaceMo(null)">＋ 送り先を追加</button>
  </div>
</div>

    <input type="hidden" id="epId">
    <label>場所名</label><input type="text" id="pNameInp" placeholder="Venus">
    <label>住所</label><input type="text" id="pAddrInp" placeholder="大阪市中央区〇〇">

<div class="mo" id="moHistDetail">
  <div class="mbox">
    <div class="mtitle">
      <span id="moHistTitle">📅 スケジュール詳細</span>
      <button class="mclose" onclick="closeMo('moHistDetail')">✕</button>
    </div>
    <div id="moHistBody"></div>
  </div>
</div>

<div class="mo" id="moOverwrite">
  <div class="mbox">
    <div class="mtitle"><span>⚠️ 上書き確認</span></div>
    <div id="moOverwriteMsg" style="font-size:13px;color:var(--tx);margin-bottom:16px;line-height:1.7"></div>
    <button class="btn bp" onclick="doSave()">✅ 上書きして保存</button>
    <button class="btn bg" onclick="closeMo('moOverwrite')">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== GAS設定 ==========
// GASをデプロイした後、ここにURLを貼り付けてください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeJasg0xdLQSAw163Cs1KjBi1gNyvn5Ss6t3RfG6eU45bu0nyBGVJRz99wHVllW-DK/exec';

// ========== 状態変数 ==========
let memoText = '', memoTimer = null;
let depLocs = [];
let girls = [];
let places = [];
let dCnt = 20, gCnt = 20, pCnt = 20;
let schedHistory = [];
let histCnt = 0;

let depMode = 'saved';
let girlRows = [];
let rowUid = 0;
let builtRuns = [];
let outShunTxt='', outBoyTxt='', outTab='shun';
let currentBuiltDate='', currentBuiltDateLabel='';

// ========== GAS通信 ==========
async function gasGet() {
  const res = await fetch(GAS_URL + '?action=all&_=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function gasPost(data) {
  if (!GAS_URL || GAS_URL.startsWith('YOUR')) return;
  const d = JSON.parse(JSON.stringify(data));
  if (d.payload) { delete d.payload.shunTxt; delete d.payload.boyTxt; }
  const action = d.action; delete d.action;
  fetch(GAS_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(d)), {mode:'no-cors'})
    .catch(function(e) { console.warn('GAS save failed:', e); });
}

function saveCounters() {
  gasPost({action:'saveCounters', payload:{dCnt:dCnt,gCnt:gCnt,pCnt:pCnt,histCnt:histCnt}});
}
function onMemoInput(){
  clearTimeout(memoTimer);
  memoTimer = setTimeout(function(){
    memoText = document.getElementById('memoInp').value;
    gasPost({action:'saveMemo', memo: memoText});
  }, 1500);
}

// ========== 起動処理（非同期） ==========
(async function(){
  const overlay = document.getElementById('loadingOverlay');

  if (!GAS_URL || GAS_URL.startsWith('YOUR')) {
    overlay.querySelector('.loading-text').textContent = '⚠️ GAS URLが未設定です';
    overlay.querySelector('.loading-sub').textContent = 'docs/index.html の GAS_URL を設定してください';
    overlay.querySelector('.loading-spinner').style.display = 'none';
    setTimeout(function(){ overlay.style.display='none'; initApp(); }, 2000);
    return;
  }

  try {
    const res = await gasGet();
    if (res.ok) {
      girls        = res.data.girls        || [];
      places       = res.data.places       || [];
      depLocs      = res.data.depLocs      || [];
      schedHistory = res.data.schedHistory || [];
      schedHistory.forEach(function(e){ rebuildHistTexts(e); });
      const c      = res.data.counters     || {};
      dCnt    = c.dCnt    || 20;
      gCnt    = c.gCnt    || 20;
      pCnt    = c.pCnt    || 20;
      histCnt = c.histCnt || 0;
      memoText = res.data.memo || '';
    }
  } catch(e) {
    console.error('GAS load failed:', e);
    showToast('⚠️ データの読み込みに失敗しました');
  }

  overlay.style.display = 'none';
  initApp();
  renderHistPage();
  document.getElementById('memoInp').value = memoText;
  var seenMemo = localStorage.getItem('memoSeen') || '';
  if (memoText && memoText !== seenMemo) openMemo(false);
  else closeMemoSheet(false);
  localStorage.setItem('memoSeen', memoText);

  setInterval(async function(){
    try {
      const res = await gasGet();
      if (!res.ok) return;
      schedHistory = res.data.schedHistory || schedHistory;
      schedHistory.forEach(function(e){ rebuildHistTexts(e); });
      histCnt = (res.data.counters || {}).histCnt || histCnt;
      if (document.getElementById('pg-hist').classList.contains('active')) renderHistPage();
      const newMemo = res.data.memo || '';
      if (newMemo !== memoText) {
        memoText = newMemo;
        const inp = document.getElementById('memoInp');
        if (document.activeElement !== inp) inp.value = newMemo;
      }
    } catch(e) {}
  }, 10000);
})();

function setPgHeight(){
  const hdrBottom=document.querySelector('.hdr').getBoundingClientRect().bottom;
  document.querySelectorAll('.pg').forEach(function(el){el.style.height=(window.innerHeight-hdrBottom)+'px';});
}
function slideTo(idx){
  var s=document.getElementById('histSlider');
  s.scrollTo({left:idx*s.offsetWidth,behavior:'smooth'});
}
var _memoIsOpen=false,_memoStartY=0,_memoStartTransY=0;
function _memoClosedY(){var b=document.querySelector('.memo-box');var nav=document.querySelector('.bnav');return b.offsetHeight-(nav?nav.offsetHeight:55)-20;}
function openMemo(animate){
  _memoIsOpen=true;
  var b=document.querySelector('.memo-box');
  b.style.transition=animate?'transform 0.4s cubic-bezier(0.32,0.72,0,1)':'none';
  b.style.transform='translateY(0)';
}
function closeMemoSheet(animate){
  _memoIsOpen=false;
  var b=document.querySelector('.memo-box');
  b.style.transition=animate?'transform 0.4s cubic-bezier(0.32,0.72,0,1)':'none';
  b.style.transform='translateY('+_memoClosedY()+'px)';
  document.getElementById('memoInp').blur();
}
function initApp() {
  setPgHeight();
  window.addEventListener('resize',setPgHeight);
  var sl=document.getElementById('histSlider');
  sl.addEventListener('scroll',function(){
    var m=this.scrollLeft>this.offsetWidth*0.5;
    document.getElementById('dot-today').classList.toggle('active',!m);
    document.getElementById('dot-months').classList.toggle('active',m);
  });
  var handle=document.querySelector('.memo-handle');
  handle.addEventListener('touchstart',function(e){
    _memoStartY=e.touches[0].clientY;
    _memoStartTransY=_memoIsOpen?0:_memoClosedY();
    document.querySelector('.memo-box').style.transition='none';
  },{passive:true});
  handle.addEventListener('touchmove',function(e){
    var dy=e.touches[0].clientY-_memoStartY;
    var raw=_memoStartTransY+dy;
    var cl=_memoClosedY();
    var y;
    if(raw<0)y=Math.max(raw*0.25,-60);
    else if(raw>cl)y=cl+(raw-cl)*0.25;
    else y=raw;
    document.querySelector('.memo-box').style.transform='translateY('+y+'px)';
  },{passive:true});
  handle.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-_memoStartY;
    if(_memoIsOpen&&dy>30)closeMemoSheet(true);
    else if(!_memoIsOpen&&dy<-30)openMemo(true);
    else if(_memoIsOpen)openMemo(true);
    else closeMemoSheet(true);
  },{passive:true});
  document.getElementById('memoInp').addEventListener('focus',function(){
    if(!_memoIsOpen)this.blur();
  });
  handle.addEventListener('click',function(){_memoIsOpen?closeMemoSheet(true):openMemo(true);});
  const t = new Date();
  document.getElementById('dateInp').value = fmtDV(t);
  addGirlRow();
  refreshDepSel();
  renderMasters();
  updateAutoDepDisplay();
  switchPg('hist');
  document.querySelector('.fab').classList.add('init');
}

// ========== ユーティリティ ==========
function fmtDV(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function normDV(v){if(!v)return'';const m=String(v).replace(/\//g,'-').match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);return m?m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0'):''}
function fmtDL(v){if(!v)return'';const d=new Date(normDV(v)+'T00:00:00');if(isNaN(d.getTime()))return'';return `${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`}
function fmtDLFull(v){if(!v)return'';const d=new Date(normDV(v)+'T00:00:00');if(isNaN(d.getTime()))return'';return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${'日月火水木金土'[d.getDay()]})`}
function fmtMonth(v){if(!v)return'';const d=new Date(normDV(v)+'T00:00:00');if(isNaN(d.getTime()))return'';return `${d.getFullYear()}年${d.getMonth()+1}月`}
function addMin(hhmm,min){const[h,m]=hhmm.split(':').map(Number);const t=h*60+m+Number(min);return `${p2(Math.floor(t/60)%24)}:${p2(t%60)}`}
function subMin(hhmm,min){const[h,m]=hhmm.split(':').map(Number);let t=h*60+m-Number(min);if(t<0)t+=1440;return `${p2(Math.floor(t/60)%24)}:${p2(t%60)}`}
function ceil5(min){return Math.ceil(Number(min)/5)*5;}
function roundTime5(hhmm){const[h,m]=hhmm.split(':').map(Number);const t=Math.floor((h*60+m)/5)*5;return `${p2(Math.floor(t/60)%24)}:${p2(t%60)}`}
function setToday(){document.getElementById('dateInp').value=fmtDV(new Date())}
function setTomorrow(){const t=new Date();t.setDate(t.getDate()+1);document.getElementById('dateInp').value=fmtDV(t)}
function todayVal(){return fmtDV(new Date())}

// ========== ページ切り替え ==========
function switchPg(p){
  document.querySelectorAll('.pg').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  document.getElementById('nb-'+p).classList.add('active');
  if(p==='hist') renderHistPage();
}

function openSchedModal(){
  document.getElementById('moSched').classList.add('open');
}
function closeSchedModal(){
  document.getElementById('moSched').classList.remove('open');
}

// ========== 出発地モード ==========
function setDepMode(m){
  depMode=m;
  document.getElementById('dt-saved').classList.toggle('sel',m==='saved');
  document.getElementById('dt-manual').classList.toggle('sel',m==='manual');
  document.getElementById('dep-saved-area').style.display=m==='saved'?'block':'none';
  document.getElementById('dep-manual-area').style.display=m==='manual'?'block':'none';
  document.getElementById('autoDepDisplay').style.display=m==='saved'?'block':'none';
  updateAutoDepDisplay();
}

function refreshDepSel(){
  const sel=document.getElementById('depLocSel');
  sel.innerHTML='<option value="">-- 選択 --</option>'+
    depLocs.map(d=>`<option value="${d.id}">${d.name}${d.addr?' ('+d.addr+')':''}</option>`).join('');
}
function onDepChange(){ updateAutoDepDisplay(); }

function getDepName(){
  if(depMode==='manual') return document.getElementById('depManualName').value||'出発地';
  const id=document.getElementById('depLocSel').value;
  const d=depLocs.find(x=>x.id==id);
  return d?d.name:'出発地';
}

function calcFirstRunDepartTime(){
  const groups=getGroups();
  const sortedTimes=Object.keys(groups).filter(k=>k!=='_notime').sort();
  if(!sortedTimes.length) return null;
  const firstGroup=groups[sortedTimes[0]];
  const segs=buildSegments(firstGroup, true, getDepName());
  const refRow=firstGroup[0];
  for(const seg of segs){if(!refRow.mins[seg.key]) return null;}
  const shiftTime=sortedTimes[0];
  const storeArrival=subMin(shiftTime,10);
  let cursor=storeArrival;
  const revSegs=[...segs].reverse();
  for(const seg of revSegs){cursor=subMin(cursor, ceil5(refRow.mins[seg.key]));}
  return roundTime5(cursor);
}

function updateAutoDepDisplay(){
  if(depMode!=='saved') return;
  const t=calcFirstRunDepartTime();
  const el=document.getElementById('autoDepTime');
  if(t){el.textContent=t;el.style.color='var(--tx)';}
  else{el.textContent='--:--';el.style.color='#9ca3af';}
}

// ========== 女の子入力 ==========
function stepShiftTime(uid, delta){
  const r=girlRows.find(x=>x.uid===uid);
  if(!r) return;
  let [h,m]=r.shiftTime ? r.shiftTime.split(':').map(Number) : [19,0];
  let total=h*60+m;
  total+=delta*30;
  total=((total%1440)+1440)%1440;
  total=Math.round(total/30)*30;
  r.shiftTime=`${p2(Math.floor(total/60))}:${p2(total%60)}`;
  const el=document.getElementById('stepper_'+uid);
  if(el) el.textContent=r.shiftTime;
  renderGroupMinInputs();
  updateAutoDepDisplay();
}

function addGirlRow(){
  const uid=++rowUid;
  girlRows.push({uid, girlId:'', customName:'', shiftTime:'19:00', mins:{}});
  renderGirlInputs();
}
function removeGirlRow(uid){
  girlRows=girlRows.filter(r=>r.uid!==uid);
  renderGirlInputs();
  updateAutoDepDisplay();
}
function onGirlSel(uid,val){
  const r=girlRows.find(x=>x.uid===uid);
  if(r){r.girlId=val;r.customName='';}
  renderGirlInputs();
}
function onCustomName(uid,val){const r=girlRows.find(x=>x.uid===uid);if(r)r.customName=val;}
function getGirlName(row){
  if(row.girlId==='_c') return row.customName||'???';
  const g=girls.find(x=>x.id==row.girlId);
  return g?g.name:'???';
}
function getStoreName(){return places.length?places[0].name:'Venus'}

function getGroups(){
  const map={};
  girlRows.forEach(r=>{
    const k=r.shiftTime||'_notime';
    if(!map[k])map[k]=[];
    map[k].push(r);
  });
  return map;
}

function renderGirlInputs(){
  const c=document.getElementById('girlInputs');
  c.innerHTML='';
  girlRows.forEach((row,i)=>{
    const d=document.createElement('div');
    d.className='gi-card';
    const gopts=girls.map(g=>`<option value="${g.id}" ${row.girlId==g.id?'selected':''}>${g.name}</option>`).join('');
    const addrHtml=(row.girlId&&row.girlId!=='_c')?(()=>{const g=girls.find(x=>x.id==row.girlId);return g?`<div style="font-size:11px;color:#6b7280;background:var(--pkp);border-radius:8px;padding:5px 10px;margin-bottom:8px;border:1px solid var(--lav)">📍 ${g.nick}</div>`:''})():'';
    d.innerHTML=`
      <div class="gi-head">
        <span class="gi-badge">👩 ${i+1}人目</span>
        ${girlRows.length>1?`<button class="rm-btn" onclick="removeGirlRow(${row.uid})">✕</button>`:''}
      </div>
      <label>女の子</label>
      <select onchange="onGirlSel(${row.uid},this.value)" style="margin-bottom:8px">
        <option value="">-- 選択 --</option>
        ${gopts}
        <option value="_c" ${row.girlId==='_c'?'selected':''}>✏️ 直接入力</option>
      </select>
      ${row.girlId==='_c'?`<input type="text" placeholder="名前" value="${row.customName}" oninput="onCustomName(${row.uid},this.value)" style="margin-bottom:8px">`:addrHtml}
      <label>出勤時間</label>
      <div class="shift-stepper">
        <button class="shift-stepper-btn" onclick="stepShiftTime(${row.uid},-1)">－</button>
        <div class="shift-stepper-time" id="stepper_${row.uid}">${row.shiftTime||'19:00'}</div>
        <button class="shift-stepper-btn" onclick="stepShiftTime(${row.uid},+1)">＋</button>
      </div>
      <div class="shift-stepper-hint">30分単位で調整</div>
      ${i===girlRows.length-1?`<button class="btn bo" style="margin-top:6px;margin-bottom:0" onclick="addGirlRow()">＋ 女の子を追加</button>`:''}
    `;
    c.appendChild(d);
  });
  renderGroupMinInputs();
}

function renderGroupMinInputs(){
  const existing=document.getElementById('groupMinSection');
  if(existing) existing.remove();
  const c=document.getElementById('girlInputs');
  const groups=getGroups();
  const sortedTimes=Object.keys(groups).filter(k=>k!=='_notime').sort();
  if(!sortedTimes.length) return;
  const section=document.createElement('div');
  section.id='groupMinSection';
  const header=document.createElement('div');
  header.style.cssText='font-size:16px;font-weight:700;color:var(--teal);margin:14px 0 8px;';
  header.textContent='🗺 区間ごとの移動時間';
  section.appendChild(header);
  const depName=getDepName();
  sortedTimes.forEach((shiftTime,gi)=>{
    const group=groups[shiftTime];
    const isFirst=gi===0;
    const startLabel=isFirst?depName:getStoreName();
    const segs=buildSegments(group,isFirst,startLabel);
    const refRow=group[0];
    const wrap=document.createElement('div');
    wrap.style.cssText='background:#fef0f5;border-radius:14px;padding:12px 14px;margin-bottom:10px;border:1.5px solid var(--lav)';
    let html=`<div style="font-size:14px;font-weight:700;color:var(--teal);margin-bottom:10px">🚗 ${shiftTime} 出勤グループ（${group.length}人）</div>`;
    segs.forEach(seg=>{
      const stored=refRow.mins[seg.key]||'';
      html+=`
        <div style="font-size:13px;color:#6b7280;margin-bottom:3px">📍 ${seg.from} → ${seg.to}</div>
        <div class="min-row">
          <input type="number" min="1" max="90" placeholder="分" value="${stored}"
            id="seginp_${refRow.uid}_${seg.key}"
            oninput="onSegMin(${refRow.uid},'${seg.key}',this.value)">
          <span>分</span>
          <button class="bmap" id="bmapbtn_${refRow.uid}_${seg.key}"
            onclick="mockMapCalc(${refRow.uid},'${seg.key}','${seg.from.replace(/'/g,'').replace(/"/g,'')}','${seg.to.replace(/'/g,'').replace(/"/g,'')}')">🗺 自動</button>
        </div>
      `;
    });
    wrap.innerHTML=html;
    section.appendChild(wrap);
    autoCalcEmptySegs(refRow.uid, segs, null, null);
  });
  c.appendChild(section);
}

function buildSegments(group, isFirstRun, startLabel){
  const segs=[];
  const store=getStoreName();
  segs.push({key:'start_to_0', from:startLabel, to:getGirlName(group[0])});
  for(let i=0;i<group.length-1;i++){
    segs.push({key:`${i}_to_${i+1}`, from:getGirlName(group[i]), to:getGirlName(group[i+1])});
  }
  segs.push({key:`${group.length-1}_to_store`, from:getGirlName(group[group.length-1]), to:store});
  return segs;
}

function onSegMin(refUid, key, val){
  const r=girlRows.find(x=>x.uid==refUid);
  if(r) r.mins[key]=val;
  updateAutoDepDisplay();
}

function mockMapCalc(refUid, key, from, to, silent){
  const btnId=`bmapbtn_${refUid}_${key}`;
  const btn=document.getElementById(btnId);
  if(btn){btn.classList.add('calculating');btn.textContent='⏳';}
  setTimeout(()=>{
    const rawMin=5+Math.floor(Math.random()*41);
    const min=ceil5(rawMin);
    onSegMin(refUid, key, String(min));
    const inp=document.getElementById(`seginp_${refUid}_${key}`);
    if(inp) inp.value=min;
    if(btn){btn.classList.remove('calculating');btn.textContent='🗺 自動';}
    if(!silent) showToast(`🗺 ${from}→${to}: ${min}分`);
  }, 700+Math.random()*600);
}

function autoCalcEmptySegs(refUid, segs, from, to){
  segs.forEach(seg=>{
    const r=girlRows.find(x=>x.uid==refUid);
    if(r && !r.mins[seg.key]){
      mockMapCalc(refUid, seg.key, seg.from, seg.to, true);
    }
  });
}

// ========== スケジュール生成 ==========
function buildSchedule(){
  const groups=getGroups();
  const sortedTimes=Object.keys(groups).filter(k=>k!=='_notime').sort();
  if(!sortedTimes.length){showToast('出勤時間を入れてね！');return;}
  for(const t of sortedTimes){
    const g=groups[t];
    if(g.some(r=>!r.girlId&&!r.customName)){showToast('名前が未入力の子がいるよ！');return;}
    const segs=buildSegments(g, sortedTimes.indexOf(t)===0, getDepName());
    const refRow=g[0];
    for(const seg of segs){
      if(!refRow.mins[seg.key]){showToast(`移動時間が未入力:\n${seg.from}→${seg.to}`);return;}
    }
  }

  const dateVal=document.getElementById('dateInp').value;
  const dateLabel=fmtDL(dateVal);
  const store=getStoreName();
  const depName=getDepName();
  builtRuns=[];
  currentBuiltDate=dateVal;
  currentBuiltDateLabel=dateLabel;

  sortedTimes.forEach((shiftTime,gi)=>{
    const group=groups[shiftTime];
    const isFirst=gi===0;
    const startLabel=isFirst?depName:store;
    const segs=buildSegments(group,isFirst,startLabel);
    const refRow=group[0];
    const storeArrival=subMin(shiftTime,10);
    let times=new Array(group.length+2);
    times[group.length+1]=storeArrival;
    for(let i=group.length-1;i>=0;i--){
      const key=i===group.length-1?`${i}_to_store`:`${i}_to_${i+1}`;
      const m=ceil5(refRow.mins[key]);
      times[i+1]=roundTime5(subMin(times[i+2], m));
    }
    times[0]=roundTime5(subMin(times[1], ceil5(refRow.mins['start_to_0'])));
    let departTime;
    if(isFirst && depMode==='manual'){
      departTime=document.getElementById('depManualTime').value||times[0];
    } else {
      departTime=times[0];
    }
    const departLabel=`${departTime}${startLabel}出発`;
    const stops=[];
    group.forEach((row,i)=>{
      const minKey=i===0?'start_to_0':`${i-1}_to_${i}`;
      stops.push({time:times[i+1], name:getGirlName(row), type:'pick', min:refRow.mins[minKey]});
    });
    stops.push({time:storeArrival, name:store, type:'drop', min:refRow.mins[`${group.length-1}_to_store`]});
    builtRuns.push({departTime, departLabel, stops});
  });

  renderResult(dateLabel);
  buildOutputText(dateLabel);
  document.getElementById('resultSection').style.display='block';
  document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderResult(dateLabel){
  const c=document.getElementById('resultBlocks');
  c.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--txs);margin-bottom:10px">${dateLabel}</div>`;
  builtRuns.forEach(run=>{
    const d=document.createElement('div');
    d.className='run-block';
    let html=`<div class="run-label">🚗 ${run.departLabel}</div>`;
    run.stops.forEach(s=>{
      const badge=s.type==='pick'?'<span class="tl-badge badge-pick">迎え</span>':'<span class="tl-badge badge-drop">店着</span>';
      const dot=s.type==='pick'?'dot-pick':'dot-drop';
      html+=`<div class="tl-item">
        <div class="tl-dot ${dot}"></div>
        <span class="tl-time">${s.time}</span>
        <span class="tl-name">${s.name}</span>
        ${badge}
        <span class="tl-min">${s.min}分</span>
      </div>`;
    });
    d.innerHTML=html;
    c.appendChild(d);
  });
}

function buildOutputText(dateLabel){
  let shun=[dateLabel,''], boy=[dateLabel,''];
  builtRuns.forEach((run,ri)=>{
    shun.push(run.departLabel);
    run.stops.forEach(s=>{
      shun.push(`${s.min}分`);
      shun.push(`${s.time}${s.name}${s.type==='pick'?'迎え':'着'}`);
      boy.push(`${s.time}${s.name}${s.type==='pick'?'迎え':'着'}`);
    });
    if(ri<builtRuns.length-1){shun.push('');boy.push('');}
  });
  outShunTxt=shun.join('\n'); outBoyTxt=boy.join('\n');
  document.getElementById('outShun').textContent=outShunTxt;
  document.getElementById('outBoy').textContent=outBoyTxt;
  switchOutTab(outTab);
}

function switchOutTab(t){
  outTab=t;
  document.getElementById('tabS').className='otab'+(t==='shun'?' active':'');
  document.getElementById('tabB').className='otab'+(t==='boy'?' active':'');
  document.getElementById('outShun').style.display=t==='shun'?'block':'none';
  document.getElementById('outBoy').style.display=t==='boy'?'block':'none';
  document.getElementById('cpyS').style.display=t==='shun'?'flex':'none';
  document.getElementById('cpyB').style.display=t==='boy'?'flex':'none';
}
function copyOut(who){
  const txt=who==='shun'?outShunTxt:outBoyTxt;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('コピーしました！📋'));
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピーしました！📋');}
}

// ========== スケジュール保存 ==========
function saveSchedule(){
  if(!builtRuns.length){showToast('先にスケジュールを生成してね！');return;}
  const existing=schedHistory.findIndex(x=>x.dateVal===currentBuiltDate);
  if(existing>=0){
    document.getElementById('moOverwriteMsg').textContent=
      `${currentBuiltDateLabel} のスケジュールはすでに保存されています。上書きしますか？`;
    document.getElementById('moOverwrite').classList.add('open');
    return;
  }
  doSave();
}

function doSave(){
  closeMo('moOverwrite');
  const existing=schedHistory.findIndex(x=>x.dateVal===currentBuiltDate);
  const savedShunTxt=outShunTxt, savedBoyTxt=outBoyTxt;
  const savedDateLabel=currentBuiltDateLabel;
  const entry={
    id: existing>=0 ? schedHistory[existing].id : ++histCnt,
    dateVal: currentBuiltDate,
    dateLabel: savedDateLabel,
    runs: JSON.parse(JSON.stringify(builtRuns)),
    shunTxt: savedShunTxt,
    boyTxt: savedBoyTxt,
    savedAt: new Date().toISOString()
  };
  if(existing>=0) schedHistory[existing]=entry;
  else schedHistory.unshift(entry);

  gasPost({action:'saveSchedule', payload:entry});
  if(existing<0) saveCounters();

  resetSchedForm();
  closeSchedModal();
  showSaveSuccessBar(savedDateLabel, savedShunTxt, savedBoyTxt);
}

function resetSchedForm(){
  document.getElementById('dateInp').value=fmtDV(new Date());
  girlRows=[];rowUid=0;
  addGirlRow();
  document.getElementById('depLocSel').value='';
  document.getElementById('depManualName').value='';
  document.getElementById('resultSection').style.display='none';
  builtRuns=[];outShunTxt='';outBoyTxt='';
  updateAutoDepDisplay();
}

let _savedShunTxt='', _savedBoyTxt='';

function showSaveSuccessBar(dateLabel, shunTxt, boyTxt){

// ========== 履歴ページ ==========
function buildRunsHtml(e){
  let h='';
  e.runs.forEach((run,ri)=>{
    h+=`<div class="hist-detail-run"><div class="hist-detail-run-lbl">🚗 ${run.departLabel}</div>`;
    run.stops.forEach((s,si)=>{
      const dot=s.type==='pick'?'dot-pick':'dot-drop';
      const badge=s.type==='pick'?'<span class="edit-time-badge badge-pick">迎え</span>':'<span class="edit-time-badge badge-drop">店着</span>';
      const minB=s.min?`<span style="font-size:10px;color:var(--txs);background:var(--pul);padding:2px 7px;border-radius:20px;flex-shrink:0">${s.min}分</span>`:'';
      h+=`<div class="edit-time-row"><div class="tl-dot ${dot}"></div><input class="edit-time-inp" type="time" value="${s.time}" onchange="updateHistStop(${e.id},${ri},${si},this.value)"><span class="edit-time-name">${s.name}</span>${badge}${minB}</div>`;
    });
    h+=`</div>`;
  });
  return h;
}
function renderHistPage(){
  const c=document.getElementById('histContent');
  const tp=document.getElementById('histPageToday');
  if(!schedHistory.length){
    tp.innerHTML=`<div class="empty-hist"><div class="ei">📭</div><p>まだ保存されたスケジュールはないよ</p><p style="margin-top:6px;font-size:11px">スケジュールを生成して「保存」ボタンを押してね！</p></div>`;
    c.innerHTML='';
    return;
  }
  const today=todayVal();
  const todayEntry=schedHistory.find(x=>x.dateVal===today);
  const others=schedHistory.filter(x=>x.dateVal!==today);
  let todayHtml=`<div class="today-banner"><div class="today-banner-label">📅 今日のスケジュール</div>`;
  if(todayEntry){
    todayHtml+=`<div class="today-banner-date">${fmtDLFull(todayEntry.dateVal)}</div>`;
    todayHtml+=buildRunsHtml(todayEntry);
    todayHtml+=`<div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bdk sm" style="flex:1" onclick="copyHistText(${todayEntry.id},'shun')">🌙 しゅん用コピー</button>
      <button class="btn bgr sm" style="flex:1" onclick="copyHistText(${todayEntry.id},'boy')">📤 ボーイ用コピー</button>
    </div>
    <button class="btn bd sm" style="margin-top:8px;width:100%" onclick="deleteHist(${todayEntry.id})">🗑️ 削除</button>`;
  } else {
    todayHtml+=`<div class="today-banner-date" style="opacity:.7">登録なし</div>
      <div class="today-banner-empty">スケジュールタブで生成・保存してね</div>`;
  }
  todayHtml+=`</div>`;
  tp.innerHTML=todayHtml;
  let html='';
  const monthMap={};
  others.forEach(e=>{
    const m=fmtMonth(e.dateVal);
    if(!monthMap[m])monthMap[m]=[];
    monthMap[m].push(e);
  });
  Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([month, entries],mi)=>{
    const accId=`acc_${mi}`;
    html+=`<div class="month-acc" id="${accId}">
      <div class="month-acc-hdr" onclick="toggleAcc('${accId}')">
        <span class="month-acc-title">📆 ${month}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="month-acc-count">${entries.length}件</span>
          <span class="month-acc-arr">▼</span>
        </div>
      </div>
      <div class="month-acc-body">`;
    entries.sort((a,b)=>b.dateVal.localeCompare(a.dateVal)).forEach(e=>{
      const girlNames=e.runs.flatMap(r=>r.stops.filter(s=>s.type==='pick').map(s=>s.name)).join('・');
      html+=`<div class="hist-item" onclick="openHistDetail(${e.id})">
        <div class="hist-item-hdr">
          <div>
            <div class="hist-item-date">${fmtDLFull(e.dateVal)}</div>
            <div class="hist-item-sub">👩 ${girlNames||'データなし'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="hist-item-badge">${e.runs.length}便</span>
            <span class="hist-item-arr">›</span>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  c.innerHTML=html;
}

function toggleAcc(id){document.getElementById(id).classList.toggle('open');}

function quickCopyBoy(id){
  const e=schedHistory.find(x=>x.id==id);
  if(!e) return;
  if(navigator.clipboard)navigator.clipboard.writeText(e.boyTxt).then(()=>showToast('ボーイ用をコピーしました！📤'));
  else{const ta=document.createElement('textarea');ta.value=e.boyTxt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('ボーイ用をコピーしました！📤');}
}

function openHistDetail(id){
  const e=schedHistory.find(x=>x.id==id);
  if(!e) return;
  document.getElementById('moHistTitle').textContent=`📅 ${fmtDLFull(e.dateVal)}`;
  let html=buildRunsHtml(e);
  html+=`<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn bdk" style="flex:1;margin-bottom:0" onclick="copyHistText(${e.id},'shun')">🌙 しゅん用コピー</button>
    <button class="btn bgr" style="flex:1;margin-bottom:0" onclick="copyHistText(${e.id},'boy')">📤 ボーイ用コピー</button>
  </div>`;
  html+=`<button class="btn bd" style="margin-top:8px" onclick="deleteHist(${e.id})">🗑️ このスケジュールを削除</button>`;
  document.getElementById('moHistBody').innerHTML=html;
  document.getElementById('moHistDetail').classList.add('open');
}

function updateHistStop(entryId, runIdx, stopIdx, newTime){
  const e=schedHistory.find(x=>x.id==entryId);
  if(!e) return;
  e.runs[runIdx].stops[stopIdx].time=newTime;
  rebuildHistTexts(e);
  gasPost({action:'updateSchedule', payload:e});
  showToast('時間を更新しました ✏️');
}

function rebuildHistTexts(e){
  const dateLabel=e.dateLabel||'';
  let shun=[dateLabel,''], boy=[dateLabel,''];
  e.runs.forEach((run,ri)=>{
    shun.push(run.departLabel);
    run.stops.forEach(s=>{
      shun.push(`${s.min}分`);
      shun.push(`${s.time}${s.name}${s.type==='pick'?'迎え':'着'}`);
      boy.push(`${s.time}${s.name}${s.type==='pick'?'迎え':'着'}`);
    });
    if(ri<e.runs.length-1){shun.push('');boy.push('');}
  });
  e.shunTxt=shun.join('\n');
  e.boyTxt=boy.join('\n');
}

function copyHistText(id, who){
  const e=schedHistory.find(x=>x.id==id);
  if(!e) return;
  const txt=who==='shun'?e.shunTxt:e.boyTxt;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('コピーしました！📋'));
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピーしました！📋');}
}

function deleteHist(id){
  schedHistory=schedHistory.filter(x=>x.id!=id);
  gasPost({action:'deleteSchedule', id:id});
  closeMo('moHistDetail');
  renderHistPage();
  showToast('削除しました 🗑️');
}

// ========== トースト ==========
let _toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{t.classList.remove('show');_toastTimer=null;},2200);
}

// ========== フォント切り替え（UI設定のみlocalStorage） ==========
function toggleFont(){
  const body = document.body;
  const isShun = body.classList.toggle('font-shun');
  document.getElementById('ftIcon').textContent  = isShun ? '📋' : '🌸';
  document.getElementById('ftLabel').textContent = isShun ? 'しゅん' : 'ひーちゃん';
  localStorage.setItem('fontMode', isShun ? 'shun' : 'hee');
}
(function(){
  if(localStorage.getItem('fontMode') === 'shun'){
    document.body.classList.add('font-shun');
    document.getElementById('ftIcon').textContent  = '📋';
    document.getElementById('ftLabel').textContent = 'しゅん';
  }
})();
