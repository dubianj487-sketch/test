name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'redesign/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Notify Discord Start
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
          CONTENT=$(printf 'commit: %s' "$COMMIT_MSG")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CONTENT" '{username: "デプロイ開始・Web", content: $c}')"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Embed commit hash
        run: sed -i 's/DEPLOY_HASH_PLACEHOLDER/${{ github.sha }}/g' docs/index.html

      - name: Copy redesign into docs
        run: cp -r redesign docs/redesign

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Wait for CDN propagation and notify
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          EXPECTED="${{ github.sha }}"
          for i in $(seq 1 60); do
            FOUND=$(curl -s "${PAGE_URL}index.html" | grep -oP '(?<=build-hash" content=")[a-f0-9]+' || true)
            if [ "$FOUND" = "$EXPECTED" ]; then
              CONTENT=$(printf 'commit: %s' "$COMMIT_MSG")
              curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg c "$CONTENT" '{username: "デプロイ完了・Web", content: $c}')"
              exit 0
            fi
            sleep 5
          done
          CONTENT=$(printf 'commit: %s' "$COMMIT_MSG")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CONTENT" '{username: "デプロイ完了・Web", content: $c}')"
