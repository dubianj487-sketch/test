name: Deploy LINE Bot GAS

on:
  push:
    branches:
      - main
    paths:
      - 'line-bot/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord Start
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "DEPLOY_START=$(date +%s)" >> $GITHUB_ENV
          CONTENT=$(printf 'commit: %s' "$COMMIT_MSG")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CONTENT" '{username: "デプロイ開始・LINEボット", content: $c}')"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          CREDS="${{ secrets.CLASPRC_JSON_BASE64 }}"
          if [ -z "$CREDS" ]; then
            echo "⚠️ CLASPRC_JSON_BASE64 が未設定のためデプロイをスキップします"
            exit 1
          fi
          echo "$CREDS" | base64 -d > ~/.clasprc.json

      - name: Push to Google Apps Script
        working-directory: line-bot
        run: clasp push --force

      - name: Deploy Web App
        working-directory: line-bot
        run: |
          DEPLOY_LIST=$(clasp deployments 2>&1)
          echo "=== 既存デプロイ一覧 ==="
          echo "$DEPLOY_LIST"

          EXISTING_ID=$(echo "$DEPLOY_LIST" | grep -v '@HEAD' | grep -oP '(?<=- )[A-Za-z0-9_-]{30,}' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "既存デプロイを更新: $EXISTING_ID"
            clasp deploy --deploymentId "$EXISTING_ID" --description "production"
          else
            echo "新規デプロイを作成"
            clasp deploy --description "production"
          fi

      - name: Notify Discord Complete
        if: always()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          ELAPSED=$(( $(date +%s) - $DEPLOY_START ))
          CONTENT=$(printf 'commit: %s\n⏱ %s秒' "$COMMIT_MSG" "$ELAPSED")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CONTENT" '{username: "デプロイ完了・LINEボット", content: $c}')"
