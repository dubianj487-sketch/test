name: Deploy GAS and Update App URL

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord Start
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"🔄 GASデプロイ開始...\"}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Check if GAS files changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- gas/ 2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "GAS_CHANGED=true" >> $GITHUB_ENV
            echo "gas/ ファイルが変更されました: $CHANGED"
          else
            echo "GAS_CHANGED=false" >> $GITHUB_ENV
            echo "gas/ に変更なし。GASデプロイをスキップします。"
          fi

      - name: Setup Node.js
        if: env.GAS_CHANGED == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        if: env.GAS_CHANGED == 'true'
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        if: env.GAS_CHANGED == 'true'
        run: |
          CREDS="${{ secrets.CLASPRC_JSON_BASE64 }}"
          if [ -z "$CREDS" ]; then
            echo "⚠️ CLASP_CREDENTIALS が未設定のため GAS デプロイをスキップします"
            echo "SKIP_GAS=true" >> $GITHUB_ENV
          else
            echo "$CREDS" | base64 -d > ~/.clasprc.json
            echo "SKIP_GAS=false" >> $GITHUB_ENV
          fi

      - name: Push to Google Apps Script
        if: env.GAS_CHANGED == 'true' && env.SKIP_GAS == 'false'
        run: clasp push --force

      - name: Delete old GAS versions to stay under 200 limit
        if: env.SKIP_GAS == 'false'
        run: |
          SCRIPT_ID="1mONDYVSKP6W7xTIj_ojGflnF6Ii5fDPmuXkxAaTAk2mVix-5l13ws3wF"
          ACCESS_TOKEN=$(python3 -c "import json; d=json.load(open('$HOME/.clasprc.json')); print(d.get('token',{}).get('access_token',''))")
          VERSIONS=$(curl -s "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/versions?pageSize=200" \
            -H "Authorization: Bearer $ACCESS_TOKEN")
          COUNT=$(echo "$VERSIONS" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('versions',[])))")
          echo "現在のバージョン数: $COUNT"
          if [ "$COUNT" -ge 195 ]; then
            echo "古いバージョンを削除します..."
            echo "$VERSIONS" | python3 -c "
          import sys,json
          vs=sorted(json.load(sys.stdin).get('versions',[]),key=lambda x:x.get('versionNumber',0))
          for v in vs[:60]:
              print(v['versionNumber'])
          " | while read VN; do
              curl -s -X DELETE "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/versions/${VN}" \
                -H "Authorization: Bearer $ACCESS_TOKEN" > /dev/null
              echo "削除: version $VN"
            done
          fi

      - name: Deploy Web App and update URL in HTML
        if: env.GAS_CHANGED == 'true' && env.SKIP_GAS == 'false'
        run: |
          # 既存デプロイを確認
          DEPLOY_LIST=$(clasp deployments 2>&1)
          echo "=== 既存デプロイ一覧 ==="
          echo "$DEPLOY_LIST"

          # HEAD以外のデプロイIDを取得
          EXISTING_ID=$(echo "$DEPLOY_LIST" | grep -v '@HEAD' | grep -oP '(?<=- )[A-Za-z0-9_-]{30,}' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "既存デプロイを更新: $EXISTING_ID"
            DEPLOY_OUT=$(clasp deploy --deploymentId "$EXISTING_ID" --description "production" 2>&1)
            echo "$DEPLOY_OUT"
            DEPLOY_ID="$EXISTING_ID"
          else
            echo "新規デプロイを作成"
            DEPLOY_OUT=$(clasp deploy --description "production" 2>&1)
            echo "$DEPLOY_OUT"
            DEPLOY_ID=$(echo "$DEPLOY_OUT" | grep -oP '(?<=- )[A-Za-z0-9_-]{30,}' | head -1)
          fi

          echo "=== デプロイID: $DEPLOY_ID ==="

          if [ -z "$DEPLOY_ID" ]; then
            echo "❌ デプロイIDの取得に失敗"
            exit 1
          fi

          WEB_APP_URL="https://script.google.com/macros/s/${DEPLOY_ID}/exec"
          echo "✅ Web App URL: $WEB_APP_URL"

          # docs/index.html の GAS_URL を更新
          sed -i "s|const GAS_URL = '.*'|const GAS_URL = '${WEB_APP_URL}'|g" docs/index.html

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/index.html
          if ! git diff --staged --quiet; then
            git commit -m "auto: GAS Web App URLを設定 [skip ci]"
            git push
          fi

      - name: Notify Discord Complete
        if: always()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ GASデプロイ完了！\"}"
