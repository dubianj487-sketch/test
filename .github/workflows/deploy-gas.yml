name: Deploy to Google Apps Script

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON_BASE64 }}
        run: echo "$CLASPRC" | base64 -d > ~/.clasprc.json

      - name: Verify credentials JSON
        run: python3 -c "import json; d=json.load(open('$HOME/.clasprc.json')); print('JSON OK, keys:', list(d.keys()))"

      - name: Push to Google Apps Script
        run: clasp push --force
