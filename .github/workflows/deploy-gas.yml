name: Deploy GAS and Update App URL

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          CREDS="${{ secrets.CLASP_CREDENTIALS }}"
          if [ -z "$CREDS" ]; then
            echo "⚠️ CLASP_CREDENTIALS が未設定のため GAS デプロイをスキップします"
            echo "SKIP_GAS=true" >> $GITHUB_ENV
          else
            echo "$CREDS" | base64 -d > ~/.clasprc.json
            echo "SKIP_GAS=false" >> $GITHUB_ENV
          fi

      - name: Push to Google Apps Script
        if: env.SKIP_GAS == 'false'
        run: clasp push --force

      - name: Deploy Web App and update URL in HTML
        if: env.SKIP_GAS == 'false'
        run: |
          # 既存デプロイを確認
          DEPLOY_LIST=$(clasp deployments 2>&1)
          echo "=== 既存デプロイ一覧 ==="
          echo "$DEPLOY_LIST"

          # HEAD以外のデプロイIDを取得
          EXISTING_ID=$(echo "$DEPLOY_LIST" | grep -v '@HEAD' | grep -oP '(?<=- )[A-Za-z0-9_-]{30,}' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "既存デプロイを更新: $EXISTING_ID"
            clasp deploy --deploymentId "$EXISTING_ID" --description "production" 2>&1
            DEPLOY_ID="$EXISTING_ID"
          else
            echo "新規デプロイを作成"
            DEPLOY_OUT=$(clasp deploy --description "production" 2>&1)
            echo "$DEPLOY_OUT"
            DEPLOY_ID=$(echo "$DEPLOY_OUT" | grep -oP '(?<=- )[A-Za-z0-9_-]{30,}' | head -1)
          fi

          echo "=== デプロイID: $DEPLOY_ID ==="

          if [ -z "$DEPLOY_ID" ]; then
            echo "❌ デプロイIDの取得に失敗"
            exit 1
          fi

          WEB_APP_URL="https://script.google.com/macros/s/${DEPLOY_ID}/exec"
          echo "✅ Web App URL: $WEB_APP_URL"

          # docs/index.html の GAS_URL を更新
          sed -i "s|YOUR_GAS_URL_HERE|${WEB_APP_URL}|g" docs/index.html
          sed -i "s|https://script\.google\.com/macros/s/[A-Za-z0-9_-]*/exec|${WEB_APP_URL}|g" docs/index.html

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/index.html
          if ! git diff --staged --quiet; then
            git commit -m "auto: GAS Web App URLを設定 [skip ci]"
            git push
          fi
